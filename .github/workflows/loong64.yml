name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

env:
  KUBE_BASE_IMAGE_REGISTRY: ${{ vars.KUBE_BASE_IMAGE_REGISTRY || 'kubernetesloong64' }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      PAUSE_TAG: ${{ steps.build-pause.outputs.PAUSE_TAG }}
      DOCKER_TAG: ${{ steps.extract.outputs.DOCKER_TAG }}
      DOCKER_TAG_NUM: ${{ steps.extract.outputs.DOCKER_TAG_NUM }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    permissions:
      contents: read
    env:
      KUBE_BUILD_PLATFORMS: linux/loong64
      KUBE_RELEASE_RUN_TESTS: n
      BASE_IMAGE_VERSION: v0.21.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract Kubernetes branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          PROJECT_KUBERNETES_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "PROJECT_KUBERNETES_VERSION=$PROJECT_KUBERNETES_VERSION"
          KUBERNETES_BRANCH=$(echo $PROJECT_KUBERNETES_VERSION | sed 's/+.*//')
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH"
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH" >> ${GITHUB_ENV}
          DOCKER_TAG=$(echo $PROJECT_KUBERNETES_VERSION | sed 's/+/-/g')
          echo "DOCKER_TAG=$DOCKER_TAG"
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_ENV}
          DOCKER_TAG_NUM=$(echo $PROJECT_KUBERNETES_VERSION | awk -F'+' '{print $2}')
          echo "DOCKER_TAG_NUM=$DOCKER_TAG_NUM"
          if echo "$PROJECT_KUBERNETES_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "DOCKER_TAG=$DOCKER_TAG" >> ${GITHUB_OUTPUT}
          echo "DOCKER_TAG_NUM=$DOCKER_TAG_NUM" >> ${GITHUB_OUTPUT}
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Extract CPU architecture
        run: |
          KUBE_CPU_ARCH="${KUBE_BUILD_PLATFORMS##*/}"
          echo "KUBE_CPU_ARCH=$KUBE_CPU_ARCH"
          echo "KUBE_CPU_ARCH=$KUBE_CPU_ARCH" >> ${GITHUB_ENV}
      - name: Clone Kubernetes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/kubernetes
          ref: ${{ env.KUBERNETES_BRANCH }}
          path: kubernetes
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make curl jq file
      - name: Install loong64 cross-compiler
        run: |
          apt update
          apt install -y gcc-loongarch64-linux-gnu binutils-loongarch64-linux-gnu
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      - name: Apply patches
        working-directory: kubernetes
        run: git apply ../*.patch
      - name: Build pause
        id: build-pause
        working-directory: kubernetes/build/pause
        env:
          ARCH: loong64
          REGISTRY: registry.k8s.io
          USE_LOCAL_CC: 1
        run: |
          echo "=== Before Docker build ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
          echo "=== Starting Docker build ==="
          ls -lha
          make container
          echo "=== After build ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
          PAUSE_TAG=$(docker images registry.k8s.io/pause --format "{{.Tag}}")
          echo "PAUSE_TAG=$PAUSE_TAG"
          echo "PAUSE_TAG=$PAUSE_TAG" >> $GITHUB_OUTPUT
          IMAGE_REF=$(docker images registry.k8s.io/pause --format "{{.Repository}}:{{.Tag}}")
          echo "=== Saving $IMAGE_REF ==="
          docker save -o pause-loong64.tar $IMAGE_REF
          echo "=== Image tarball ==="
          ls -lha pause-loong64.tar
          echo "=== Manifest ==="
          echo "--- repositories ---"
          tar -xOf pause-loong64.tar repositories
          echo "--- manifest.json ---"
          tar -xOf pause-loong64.tar manifest.json | jq
          echo "--- config ---"
          tar -xOf pause-loong64.tar $(tar -xOf pause-loong64.tar manifest.json | jq -r '.[0].Config') | jq
          echo "--- os, architecture ---"
          tar -xOf pause-loong64.tar $(tar -xOf pause-loong64.tar manifest.json | jq -r '.[0].Config') | jq '{os, architecture}'
      - name: Upload pause image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64-pause
          path: kubernetes/build/pause/pause-loong64.tar
      - name: Build Kubernetes
        working-directory: kubernetes
        run: |
          echo "=== Before Kubernetes build ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
          echo "=== Starting Kubernetes build ==="
          make release-in-a-container
          echo "=== After Kubernetes build ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
      - name: List build output
        working-directory: kubernetes
        run: find _output \( -path '_output/local/go' -o -path '_output/local/.gimme' -o -path '_output/dockerized/.gimme' -o -path '_output/dockerized/go/cache' -o -path '*LICENSES*' \) -prune -o -type f -exec ls -lh {} \;
      - name: Print binary SHA-256 checksums
        working-directory: kubernetes
        run: |
          find . -type f -name apiextensions-apiserver | xargs sha256sum
          find . -type f -name ginkgo | xargs sha256sum
          find . -type f -name go-runner | xargs sha256sum
          find . -type f -name kubeadm | xargs sha256sum
          find . -type f -name kube-aggregator | xargs sha256sum
          find . -type f -name kube-apiserver | xargs sha256sum
          find . -type f -name kube-controller-manager | xargs sha256sum
          find . -type f -name kubectl | xargs sha256sum
          find . -type f -name kubectl-convert | xargs sha256sum
          find . -type f -name kubelet | xargs sha256sum
          find . -type f -name kube-log-runner | xargs sha256sum
          find . -type f -name kubemark | xargs sha256sum
          find . -type f -name kube-proxy | xargs sha256sum
          find . -type f -name kube-scheduler | xargs sha256sum
          find . -type f -name mounter | xargs sha256sum
      - name: Inspect binary file types
        working-directory: kubernetes
        run: |
          if [ -d _output/local/bin/linux ]; then
            echo "=== _output/local/bin/linux ==="
            file _output/local/bin/linux/*/*
          fi
          if [ -d _output/dockerized/bin/linux ]; then
            echo "=== _output/dockerized/bin/linux ==="
            file _output/dockerized/bin/linux/*/*
          fi
      - name: Inspect release image manifests
        working-directory: kubernetes
        run: |
          if [ ! -d _output/release-images ]; then
            echo "No release images directory found"
            exit 0
          fi
          inspect_tarball() {
            TARBALL="$1"
            if [ ! -f "$TARBALL" ]; then
              echo "=== $TARBALL not found, skipping ==="
              return
            fi
            echo "=== $TARBALL ==="
            ls -lha "$TARBALL"
            echo "--- repositories ---"
            tar -xOf "$TARBALL" repositories
            echo "--- manifest.json ---"
            tar -xOf "$TARBALL" manifest.json | jq
            echo "--- config ---"
            tar -xOf "$TARBALL" $(tar -xOf "$TARBALL" manifest.json | jq -r '.[0].Config') | jq
            echo "--- os, architecture ---"
            tar -xOf "$TARBALL" $(tar -xOf "$TARBALL" manifest.json | jq -r '.[0].Config') | jq '{os, architecture}'
          }
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/kube-controller-manager.tar
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/kube-scheduler.tar
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/kube-apiserver.tar
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/kubectl.tar
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/conformance-$KUBE_CPU_ARCH.tar
          inspect_tarball _output/release-images/$KUBE_CPU_ARCH/kube-proxy.tar
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64-binaries
          path: |
            kubernetes/_output/local/bin/linux/*/*
            !kubernetes/_output/local/bin/linux/*/*.test
            kubernetes/_output/dockerized/bin/linux/*/*
            !kubernetes/_output/dockerized/bin/linux/*/*.test
      - name: Upload container images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64-images
          path: |
            kubernetes/_output/release-images/*/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKER_TAG: ${{ needs.build.outputs.DOCKER_TAG }}
      DOCKER_TAG_NUM: ${{ needs.build.outputs.DOCKER_TAG_NUM }}
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-loong64-binaries
          path: loong64-artifacts
      - name: Download container images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-loong64-images
          path: loong64-artifacts
      - name: Download pause image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-loong64-pause
          path: loong64-artifacts
      - name: List downloaded files
        run: find . -type f
      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Load and push Docker image
        run: |
          echo "=== Before load ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
          echo "=== Loading images ==="
          find loong64-artifacts -type f -name '*.tar' | while read -r tarball; do
            echo "--- Loading $tarball ---"
            docker load -i "$tarball"
          done
          echo "=== After load ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
          echo "=== Tag and push ==="
          for image in registry.k8s.io/pause registry.k8s.io/kubectl-loong64 registry.k8s.io/kube-controller-manager-loong64 registry.k8s.io/kube-scheduler-loong64 registry.k8s.io/conformance-loong64 registry.k8s.io/kube-apiserver-loong64 registry.k8s.io/kube-proxy-loong64; do
            SRC=$(docker images ${image} --format "{{.Repository}}:{{.Tag}}")
            DST=${{ env.KUBE_BASE_IMAGE_REGISTRY }}/$(echo $image | awk -F/ '{print $NF}' | awk -F'-loong64' '{print $1}'):$(echo $(docker images ${image} --format "{{.Tag}}") | awk -F'-linux' '{print $1}')
            echo "--- Tag $SRC -> $DST ---"
            docker tag "$SRC" "$DST"
            docker tag "$SRC" "$DST"-${{ env.DOCKER_TAG_NUM }}
            docker push "$DST"
            docker push "$DST"-${{ env.DOCKER_TAG_NUM }}
          done
          echo "=== After push ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}\t{{.Size}}" | (read -r header; echo "$header"; tail -n +2 | sort -k1,1 -k2,2)
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find loong64-artifacts -type f | while read -r file; do
            gpg --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: List Release files
        run: find loong64-artifacts -type f
      - name: Generate release body
        env:
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts

          | File                          | Download                                                                       |
          |-------------------------------|--------------------------------------------------------------------------------|
          | `apiextensions-apiserver`     | [apiextensions-apiserver](${{ env.BASE_URL }}/apiextensions-apiserver)         |
          | `conformance-loong64.tar`     | [conformance-loong64.tar](${{ env.BASE_URL }}/conformance-loong64.tar)         |
          | `ginkgo`                      | [ginkgo](${{ env.BASE_URL }}/ginkgo)                                           |
          | `go-runner`                   | [go-runner](${{ env.BASE_URL }}/go-runner)                                     |
          | `kubeadm`                     | [kubeadm](${{ env.BASE_URL }}/kubeadm)                                         |
          | `kube-aggregator`             | [kube-aggregator](${{ env.BASE_URL }}/kube-aggregator)                         |
          | `kube-apiserver.tar`          | [kube-apiserver.tar](${{ env.BASE_URL }}/kube-apiserver.tar)                   |
          | `kube-apiserver`              | [kube-apiserver](${{ env.BASE_URL }}/kube-apiserver)                           |
          | `kube-controller-manager.tar` | [kube-controller-manager.tar](${{ env.BASE_URL }}/kube-controller-manager.tar) |
          | `kube-controller-manager`     | [kube-controller-manager](${{ env.BASE_URL }}/kube-controller-manager)         |
          | `kubectl.tar`                 | [kubectl.tar](${{ env.BASE_URL }}/kubectl.tar)                                 |
          | `kubectl`                     | [kubectl](${{ env.BASE_URL }}/kubectl)                                         |
          | `kubectl-convert`             | [kubectl-convert](${{ env.BASE_URL }}/kubectl-convert)                         |
          | `kubelet`                     | [kubelet](${{ env.BASE_URL }}/kubelet)                                         |
          | `kube-log-runner`             | [kube-log-runner](${{ env.BASE_URL }}/kube-log-runner)                         |
          | `kubemark`                    | [kubemark](${{ env.BASE_URL }}/kubemark)                                       |
          | `kube-proxy.tar`              | [kube-proxy.tar](${{ env.BASE_URL }}/kube-proxy.tar)                           |
          | `kube-proxy`                  | [kube-proxy](${{ env.BASE_URL }}/kube-proxy)                                   |
          | `kube-scheduler.tar`          | [kube-scheduler.tar](${{ env.BASE_URL }}/kube-scheduler.tar)                   |
          | `kube-scheduler`              | [kube-scheduler](${{ env.BASE_URL }}/kube-scheduler)                           |
          | `mounter`                     | [mounter](${{ env.BASE_URL }}/mounter)                                         |
          | `pause-loong64.tar`           | [pause-loong64.tar](${{ env.BASE_URL }}/pause-loong64.tar)                     |
          
          Each file has a corresponding `.asc` detached GPG signature.

          ```shell
          # Binaries
          curl -LO ${{ env.BASE_URL }}/apiextensions-apiserver
          curl -LO ${{ env.BASE_URL }}/apiextensions-apiserver.asc
          curl -LO ${{ env.BASE_URL }}/ginkgo
          curl -LO ${{ env.BASE_URL }}/ginkgo.asc
          curl -LO ${{ env.BASE_URL }}/go-runner
          curl -LO ${{ env.BASE_URL }}/go-runner.asc
          curl -LO ${{ env.BASE_URL }}/kubeadm
          curl -LO ${{ env.BASE_URL }}/kubeadm.asc
          curl -LO ${{ env.BASE_URL }}/kube-aggregator
          curl -LO ${{ env.BASE_URL }}/kube-aggregator.asc
          curl -LO ${{ env.BASE_URL }}/kube-apiserver
          curl -LO ${{ env.BASE_URL }}/kube-apiserver.asc
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager.asc
          curl -LO ${{ env.BASE_URL }}/kubectl
          curl -LO ${{ env.BASE_URL }}/kubectl.asc
          curl -LO ${{ env.BASE_URL }}/kubectl-convert
          curl -LO ${{ env.BASE_URL }}/kubectl-convert.asc
          curl -LO ${{ env.BASE_URL }}/kubelet
          curl -LO ${{ env.BASE_URL }}/kubelet.asc
          curl -LO ${{ env.BASE_URL }}/kube-log-runner
          curl -LO ${{ env.BASE_URL }}/kube-log-runner.asc
          curl -LO ${{ env.BASE_URL }}/kubemark
          curl -LO ${{ env.BASE_URL }}/kubemark.asc
          curl -LO ${{ env.BASE_URL }}/kube-proxy
          curl -LO ${{ env.BASE_URL }}/kube-proxy.asc
          curl -LO ${{ env.BASE_URL }}/kube-scheduler
          curl -LO ${{ env.BASE_URL }}/kube-scheduler.asc
          curl -LO ${{ env.BASE_URL }}/mounter
          curl -LO ${{ env.BASE_URL }}/mounter.asc
          # Images
          curl -LO ${{ env.BASE_URL }}/pause-loong64.tar
          curl -LO ${{ env.BASE_URL }}/pause-loong64.tar.asc
          curl -LO ${{ env.BASE_URL }}/conformance-loong64.tar
          curl -LO ${{ env.BASE_URL }}/conformance-loong64.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-apiserver.tar
          curl -LO ${{ env.BASE_URL }}/kube-apiserver.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager.tar
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager.tar.asc
          curl -LO ${{ env.BASE_URL }}/kubectl.tar
          curl -LO ${{ env.BASE_URL }}/kubectl.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-proxy.tar
          curl -LO ${{ env.BASE_URL }}/kube-proxy.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-scheduler.tar
          curl -LO ${{ env.BASE_URL }}/kube-scheduler.tar.asc
          ```

          ## Docker image

          ```
          kubernetesloong64/pause:${{ env.DOCKER_TAG }}
          kubernetesloong64/conformance:${{ env.DOCKER_TAG }}
          kubernetesloong64/kube-apiserver:${{ env.DOCKER_TAG }}
          kubernetesloong64/kube-controller-manager:${{ env.DOCKER_TAG }}
          kubernetesloong64/kubectl:${{ env.DOCKER_TAG }}
          kubernetesloong64/kube-proxy:${{ env.DOCKER_TAG }}
          kubernetesloong64/kube-scheduler:${{ env.DOCKER_TAG }}
          ```

          Download and load the image:

          ```shell
          curl -LO ${{ env.BASE_URL }}/pause-loong64.tar
          curl -LO ${{ env.BASE_URL }}/pause-loong64.tar.asc
          curl -LO ${{ env.BASE_URL }}/conformance-loong64.tar
          curl -LO ${{ env.BASE_URL }}/conformance-loong64.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-apiserver.tar
          curl -LO ${{ env.BASE_URL }}/kube-apiserver.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager.tar
          curl -LO ${{ env.BASE_URL }}/kube-controller-manager.tar.asc
          curl -LO ${{ env.BASE_URL }}/kubectl.tar
          curl -LO ${{ env.BASE_URL }}/kubectl.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-proxy.tar
          curl -LO ${{ env.BASE_URL }}/kube-proxy.tar.asc
          curl -LO ${{ env.BASE_URL }}/kube-scheduler.tar
          curl -LO ${{ env.BASE_URL }}/kube-scheduler.tar.asc
          docker load -i pause-loong64.tar
          docker load -i conformance-loong64.tar
          docker load -i kube-apiserver.tar
          docker load -i kube-controller-manager.tar
          docker load -i kubectl.tar
          docker load -i kube-proxy.tar
          docker load -i kube-scheduler.tar
          ```

          ## Verify signatures

          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}
          files: |
            loong64-artifacts/**
