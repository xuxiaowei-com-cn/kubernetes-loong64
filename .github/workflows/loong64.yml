name: loong64
on:
  push:
    branches:
      - loong64/*
    tags:
      - release-loong64/*/*
  pull_request:
    branches:
      - loong64/*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    env:
      KUBE_BUILD_PLATFORMS: linux/loong64
      KUBE_RELEASE_RUN_TESTS: n
      KUBE_BASE_IMAGE_REGISTRY: ${{ vars.KUBE_BASE_IMAGE_REGISTRY || 'xuxiaoweicomcn' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract Kubernetes branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          KUBERNETES_BRANCH=$(echo $REF | awk -F'/' '{print $2}')
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH"
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH" >> ${GITHUB_ENV}
      - name: Extract CPU architecture
        run: |
          KUBE_CPU_ARCH="${KUBE_BUILD_PLATFORMS##*/}"
          echo "KUBE_CPU_ARCH=$KUBE_CPU_ARCH"
          echo "KUBE_CPU_ARCH=$KUBE_CPU_ARCH" >> ${GITHUB_ENV}
      - name: Clone Kubernetes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/kubernetes
          ref: ${{ env.KUBERNETES_BRANCH }}
          path: kubernetes
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make curl jq file
      - name: Install loong64 cross-compiler
        run: |
          apt update
          apt install -y gcc-loongarch64-linux-gnu binutils-loongarch64-linux-gnu
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      - name: Apply patches
        working-directory: kubernetes
        run: git apply ../*.patch
      - name: Fix conformance image Makefile path
        working-directory: kubernetes
        run: sed -i "s#build-image/debian-base#debian-base#" test/conformance/image/Makefile
      - name: Build pause
        working-directory: kubernetes/build/pause
        run: |
          docker images
          make ARCH=loong64 USE_LOCAL_CC=1 container
          docker images
      - name: Build Kubernetes
        working-directory: kubernetes
        run: make release-in-a-container
      - name: List build output
        working-directory: kubernetes
        run: find _output \( -path '_output/local/go' -o -path '_output/local/.gimme' -o -path '_output/dockerized/.gimme' -o -path '_output/dockerized/go/cache' -o -path '*LICENSES*' \) -prune -o -type f -exec ls -lh {} \;
      - name: Print binary SHA-256 checksums
        working-directory: kubernetes
        run: |
          find . -type f -name apiextensions-apiserver | xargs sha256sum
          find . -type f -name ginkgo | xargs sha256sum
          find . -type f -name go-runner | xargs sha256sum
          find . -type f -name kubeadm | xargs sha256sum
          find . -type f -name kube-aggregator | xargs sha256sum
          find . -type f -name kube-apiserver | xargs sha256sum
          find . -type f -name kube-controller-manager | xargs sha256sum
          find . -type f -name kubectl | xargs sha256sum
          find . -type f -name kubectl-convert | xargs sha256sum
          find . -type f -name kubelet | xargs sha256sum
          find . -type f -name kube-log-runner | xargs sha256sum
          find . -type f -name kubemark | xargs sha256sum
          find . -type f -name kube-proxy | xargs sha256sum
          find . -type f -name kube-scheduler | xargs sha256sum
          find . -type f -name mounter | xargs sha256sum
      - name: Inspect binary file types
        working-directory: kubernetes
        run: |
          if [ -d _output/local/bin/linux ]; then
            echo "=== _output/local/bin/linux ==="
            file _output/local/bin/linux/*/*
          fi
          if [ -d _output/dockerized/bin/linux ]; then
            echo "=== _output/dockerized/bin/linux ==="
            file _output/dockerized/bin/linux/*/*
          fi
      - name: Inspect release image manifests
        working-directory: kubernetes
        run: |
          if [ -d _output/release-images ]; then
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-controller-manager.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-controller-manager.tar manifest.json | jq
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-scheduler.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-scheduler.tar manifest.json | jq
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-apiserver.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-apiserver.tar manifest.json | jq
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/kubectl.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/kubectl.tar manifest.json | jq
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/conformance-$KUBE_CPU_ARCH.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/conformance-$KUBE_CPU_ARCH.tar manifest.json | jq
            tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-proxy.tar repositories || tar -xOf _output/release-images/$KUBE_CPU_ARCH/kube-proxy.tar manifest.json | jq
          fi
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64-binaries
          path: |
            kubernetes/_output/local/bin/linux/*/*
            !kubernetes/_output/local/bin/linux/*/*.test
            kubernetes/_output/dockerized/bin/linux/*/*
            !kubernetes/_output/dockerized/bin/linux/*/*.test
      - name: Upload container images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64-images
          path: |
            kubernetes/_output/release-images/*/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-loong64-binaries
          path: loong64-artifacts
      - name: Download container images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-loong64-images
          path: loong64-artifacts
      - name: List downloaded files
        run: find . -type f
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find loong64-artifacts -type f | while read -r file; do
            gpg --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: Package signatures
        run: |
          mkdir signatures
          find loong64-artifacts -name '*.asc' -exec mv {} signatures \;
          find signatures -name '*.asc' | tar -czf loong64-artifacts/signatures.tar.gz -T -
      - name: List Release files
        run: find loong64-artifacts -type f
      - name: Generate body
        id: generate-body
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          KUBERNETES_BRANCH=$(echo $REF | awk -F'/' '{print $2}')
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH"
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          {
            echo '**Docker Images**'
            echo
            echo '```shell'
            find loong64-artifacts -type f -name '*.tar' ! -name '*.tar.gz' | sort | sed "s|.*/|curl -LO ${URL}/|"
            echo '```'
            echo
            echo '**Usage Docker Images**'
            echo
            echo '```shell'
            echo '# Check current images in containerd before importing:'
            echo "ctr -n k8s.io i ls | grep -vE '^sha256:' | awk '{print \$1}'"
            echo '# After downloading the Docker tar files, import into containerd:'
            find loong64-artifacts -type f -name '*.tar' ! -name '*.tar.gz' | sort | sed 's|.*/|ctr -n k8s.io i import |'
            echo '# List images after importing to find the loong64 image names:'
            echo "ctr -n k8s.io i ls | grep -vE '^sha256:' | awk '{print \$1}'"
            echo '# Tag the loong64 images to the standard Kubernetes registry names:'
            echo "ctr -n k8s.io i tag registry.k8s.io/kube-apiserver-loong64:${KUBERNETES_BRANCH}-dirty registry.k8s.io/kube-apiserver:${KUBERNETES_BRANCH}"
            echo "ctr -n k8s.io i tag registry.k8s.io/kube-controller-manager-loong64:${KUBERNETES_BRANCH}-dirty registry.k8s.io/kube-controller-manager:${KUBERNETES_BRANCH}"
            echo "ctr -n k8s.io i tag registry.k8s.io/kube-scheduler-loong64:${KUBERNETES_BRANCH}-dirty registry.k8s.io/kube-scheduler:${KUBERNETES_BRANCH}"
            echo "ctr -n k8s.io i tag registry.k8s.io/kube-proxy-loong64:${KUBERNETES_BRANCH}-dirty registry.k8s.io/kube-proxy:${KUBERNETES_BRANCH}"
            echo "ctr -n k8s.io i tag registry.k8s.io/kubectl-loong64:${KUBERNETES_BRANCH}-dirty registry.k8s.io/kubectl:${KUBERNETES_BRANCH}"
            echo '# List images after tagging to verify:'
            echo "ctr -n k8s.io i ls | grep -vE '^sha256:' | awk '{print \$1}'"
            echo '```'
            echo
            echo '**Binary**'
            echo
            echo '```shell'
            find loong64-artifacts -type f ! -name '*.tar' ! -name '*.tar.gz' | sort | sed "s|.*/|curl -LO ${URL}/|"
            echo '```'
            echo
            echo '**Signatures**'
            echo
            echo '```shell'
            find loong64-artifacts -type f -name '*.tar.gz' | sort | sed "s|.*/|curl -LO ${URL}/|"
            echo '```'
          } > /tmp/release-body.md
          echo '--- RELEASE_BODY preview ---'
          cat /tmp/release-body.md
          echo '--- end preview ---'
          echo "RELEASE_BODY<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release-body.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.generate-body.outputs.RELEASE_BODY }}
          files: |
            loong64-artifacts/**
