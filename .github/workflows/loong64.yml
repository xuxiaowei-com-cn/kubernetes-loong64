name: loong64
on:
  push:
    branches:
      - loong64/*
  pull_request:
    branches:
      - loong64/*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    env:
      KUBE_BUILD_PLATFORMS: linux/loong64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: echo ${{ github.ref_name }}
      - name: Extract Kubernetes branch
        run: |
          KUBERNETES_BRANCH=$(echo ${{ github.ref_name }} | awk -F'/' '{print $2}')
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH"
          echo "KUBERNETES_BRANCH=$KUBERNETES_BRANCH" >> ${GITHUB_ENV}
      - name: Clone Kubernetes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kubernetes/kubernetes
          ref: ${{ env.KUBERNETES_BRANCH }}
          path: kubernetes
      - name: ls
        run: ls -lah
      - name: Install build tools
        run: |
          apt update
          apt install -y git make curl
      - name: Install loong64 cross-compiler
        run: |
          apt update
          apt install -y gcc-loongarch64-linux-gnu binutils-loongarch64-linux-gnu
      - name: Apply patches
        working-directory: kubernetes
        run: git apply ../*.patch
      - name: Build Kubernetes
        working-directory: kubernetes
        run: make
      - name: List build output
        working-directory: kubernetes
        run: find _output \( -path '_output/local/go' -o -path '_output/local/.gimme' -o -path '_output/dockerized/.gimme' -o -path '_output/dockerized/go/cache' -o -path '*LICENSES*' \) -prune -o -type f -exec ls -lh {} \;
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-loong64
          path: |
            kubernetes/_output/local/bin/linux/loong64/*
            !kubernetes/_output/local/bin/linux/loong64/*.test
